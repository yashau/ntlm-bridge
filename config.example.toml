# ntlm-bridge configuration
# Copy to config.toml and edit for your environment.

[server]
# Listen address. Keep this private; the bridge forwards caller credentials.
bind = "127.0.0.1:3002"
# Overall HTTP request timeout, including upstream NTLM handshake.
request_timeout_secs = 120
# Max incoming request body size in bytes.
max_body_bytes = 10485760

[upstream]
# Base URL for the NTLM-protected service. Incoming paths and query strings are
# appended to this URL.
base_url = "http://localhost:8080"
# Default NTLM domain used for Basic credentials that do not include DOMAIN\user.
domain = ""
# Workstation name sent in NTLM authenticate messages.
workstation = "ntlm-bridge"
# Upstream connect timeout.
connect_timeout_secs = 10
# Accept invalid TLS certificates for the upstream. Useful only for local labs.
accept_invalid_certs = false

[auth]
# Realm advertised to Basic and Digest clients.
realm = "ntlm-bridge"
# Used to sign stateless Digest nonces. Change this before enabling Digest.
digest_nonce_secret = "change-me"
digest_nonce_ttl_secs = 300

# Digest cannot be converted to NTLM unless the bridge already knows the
# plaintext password. Add users here to enable inbound Digest.
# [[auth.users]]
# username = "alice"
# password = "correct horse battery staple"
# domain = "EXAMPLE"
# ntlm_username = "alice"

[log]
# trace | debug | info | warn | error
level = "info"
# Logs method, target URL, and response status. Never logs passwords.
log_requests = false
