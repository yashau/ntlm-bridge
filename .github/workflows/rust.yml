name: Rust

on:
  push:
    branches: [main]
    tags:
      - "????-??-??-*"
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run CI gate
        run: mise run ci

  miri:
    name: Miri
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Test under Miri
        run: mise run miri

  release:
    name: Release
    runs-on: windows-latest
    needs: [check, miri]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: mise run release:publish
